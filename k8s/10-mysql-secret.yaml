# TEMPLATE — DO NOT `kubectl apply` THIS FILE.
#
# Real values are rendered by scripts/build_images.sh (or
# scripts/write_runtime_env.sh) into k8s/secrets.runtime.yaml (gitignored
# + dockerignored). That file is what `kubectl apply -f k8s/` actually
# picks up for the chatroom-mysql Secret.
#
# This template is committed only so the layout is visible in the repo
# and so the chatroom-mysql Deployment's `secretKeyRef.name: chatroom-mysql`
# has a peer to live next to. Applying this file would install the literal
# placeholder below as the MySQL root password, and the app pod's
# MYSQL_PASSWORD (from chatroom-app Secret, also rendered) would not match
# — MySQL would reject connections with 1045 Access denied.
#
# To regenerate the real manifest:
#   ./scripts/build_images.sh       # if you have Docker
# or
#   ./scripts/write_runtime_env.sh --from-stdin   # CI / images-built-elsewhere
apiVersion: v1
kind: Secret
metadata:
  name: chatroom-mysql
  namespace: chatroom
  labels:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: mysql
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "REPLACE_AT_DEPLOY_TIME"
