# Placeholder Secret. The real values are written by scripts/deploy_k8s.sh
# from app/.env.runtime (which is generated by scripts/build_images.sh and
# is gitignored). This manifest is intentionally invalid on its own so
# that `kubectl apply` without the deploy script produces a clear error
# rather than a working cluster with default credentials.
apiVersion: v1
kind: Secret
metadata:
  name: chatroom-mysql
  namespace: chatroom
  labels:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: mysql
type: Opaque
stringData:
  # These are placeholders — replaced at deploy time.
  MYSQL_ROOT_PASSWORD: "REPLACE_AT_DEPLOY_TIME"
