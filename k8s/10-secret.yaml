# Template only — real values are created out-of-band by scripts/bootstrap.sh
# via `kubectl create secret`, so the live secrets never appear in git.
#
# MYSQL_HOST points at the in-cluster MySQL Service. MYSQL_USER / MYSQL_PASSWORD
# must match the app user created by the init Job in 35-mysql-init-job.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: chatroom-secrets
  namespace: chatroom
type: Opaque
stringData:
  MYSQL_USER: "chatroom"
  MYSQL_PASSWORD: "CHANGE_ME_strong_random_app_password"
  MYSQL_HOST: "mysql.chatroom.svc.cluster.local"
  MYSQL_DB: "chatroom_db"
  SECRET_KEY: "CHANGE_ME_long_random_jwt_secret_at_least_64_chars"
  ROOM_SECRET_KEY: "CHANGE_ME_base64_fernet_key_=="
  MAIL_PASSWORD: "CHANGE_ME_gmail_app_password"
