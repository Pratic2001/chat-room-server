apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chatroom-mysql-data
  namespace: chatroom
  labels:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # No storageClassName: uses the cluster's default StorageClass. Works on
  # kind, k3d, minikube, GKE, EKS, AKS, etc. out of the box.
