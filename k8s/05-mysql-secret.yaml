# Template only — real values are created out-of-band by scripts/bootstrap.sh
# via `kubectl create secret`, so the live password never appears in git.
#
# The live secret is `mysql-secret` in the `chatroom` namespace. It is read
# by both the MySQL StatefulSet (for MYSQL_ROOT_PASSWORD / MYSQL_DATABASE)
# and, indirectly, by the app via the `chatroom-secrets` Secret (see 10-secret.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: chatroom
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "CHANGE_ME_strong_random_root_password"
  MYSQL_PASSWORD: "CHANGE_ME_strong_random_app_password"
  MYSQL_DATABASE: "chatroom_db"
