apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: chatroom
  labels:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: redis
spec:
  # Headless service for StatefulSet pod DNS: redis-N.redis-headless.
  # Used by replica pods (`replicaof redis-0.redis-headless 6379`) and by
  # Sentinels to discover peers without going through a load balancer.
  clusterIP: None
  selector:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP