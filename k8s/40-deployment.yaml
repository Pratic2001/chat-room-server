apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatroom-server
  namespace: chatroom
  labels:
    app: chatroom-server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: chatroom-server
  template:
    metadata:
      labels:
        app: chatroom-server
    spec:
      # Soft preference for control-plane: if both nodes have the image
      # (which the Jenkinsfile ensures by importing to both), pods can
      # land on either node. This preference just makes scheduling more
      # predictable when one node is busy.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 60
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      securityContext:
        fsGroup: 1001
      containers:
        - name: chatroom-server
          # ${TAG} is substituted by the Jenkinsfile via envsubst on every
          # build. The image was ctr-imported to every node, so
          # imagePullPolicy: Never is correct (we never want the kubelet
          # to try to pull from a registry that doesn't exist).
          image: docker.io/library/chatroom-server:${TAG}
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: chatroom-secrets
            - configMapRef:
                name: chatroom-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 24   # 2 minutes total
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
