apiVersion: v1
kind: Service
metadata:
  name: chatroom-redis
  namespace: chatroom
  labels:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: redis
spec:
  # ClusterIP — Redis is only ever reached by chatroom-app pods inside
  # the cluster. The app's REDIS_URL is `redis://chatroom-redis:6379/0`.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
