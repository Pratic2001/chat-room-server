apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: chatroom
  labels:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: redis
spec:
  # Replicas are NOT set here. scripts/deploy_k8s.sh scales this
  # StatefulSet to NODE_COUNT at deploy time.
  #
  # Pod redis-0 is the master; pods redis-1..N-1 are read-replicas. The
  # entrypoint script (rendered below via args:) decides which path to
  # take based on the pod's hostname. The replicaof directive is written
  # into a dedicated config file by the replica branch — see the long
  # comment block there for why we don't pass it via CLI args.
  serviceName: redis-headless
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: chatroom
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chatroom
        app.kubernetes.io/component: redis
        # No role label here. Master vs. replica is decided by the wrapper
        # entrypoint from the pod's hostname (redis-0 → master path;
        # redis-1..N-1 → replica path with `replicaof redis-0.redis-headless
        # 6379` written into a per-pod config file).
        # Pods can't change their own labels, so a runtime role flip after
        # failover would need a separate operator — instead, Sentinel
        # monitors redis-0.redis-headless directly and the app reconnects
        # via redis.asyncio.sentinel.Sentinel on every call. The
        # chatroom-redis Service is a static alias for all redis pods
        # (see k8s/29-redis-service.yaml).
    spec:
      # No hostPath, no nodeSelector, no nodeName.
      # tolerationSeconds: 10 on the standard node-NotReady/unreachable
      # NoExecute taints — when a node goes unhealthy, the pod is
      # evicted within 10s. Redis has no state worth preserving across
      # a node loss (every chat message is already in MySQL); a quick
      # relocate is preferable to a 5-minute wait on a dead node.
      tolerations:
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 10
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 10
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            # Wrapper entrypoint that decides master vs. replica based
            # on the pod's hostname. On master pods, exec redis-server
            # directly with the StatefulSet's `args:`. On replica pods,
            # we render the full config (including `replicaof ...`) into
            # a file and exec redis-server with that file as the only
            # arg — see the long comment in the replica branch for why
            # we can't pass `--replicaof host port` via the CLI: the
            # redis:7-alpine entrypoint turns CLI args into config-file
            # lines, and any arg that follows `--replicaof` gets
            # concatenated onto the same `replicaof` line, which Redis
            # rejects with "wrong number of arguments".
            #
            # IMPORTANT: this script runs under BusyBox ash on the
            # redis:7-alpine image (no bash). /dev/tcp/host/port is a
            # bash-only feature and silently "fails open" under ash
            # because the redirect-target /dev/tcp/.../port is treated
            # as a missing path. Use redis-cli to probe instead — it's
            # in the same image, so no extra install, and it also
            # verifies the peer speaks Redis (a bare TCP-connect check
            # would happily pass against a TCP echo server).
            - /bin/sh
            - -c
            - |
              set -u
              # NB: no `set -e`. The redis-cli calls in the discovery
              # loop below can fail transiently (Sentinel still
              # electing, the candidate master still booting, DNS
              # not yet warm) — they need to be best-effort and let
              # the loop's explicit checks decide whether to retry.
              # A `set -e` here would abort on the very first failing
              # probe and the pod would crash-loop forever.
              POD_NAME="${POD_NAME:-$(hostname)}"
              if [ "$POD_NAME" = "redis-0" ]; then
                  echo "[redis-entrypoint] master path (POD_NAME=${POD_NAME})"
                  exec redis-server "$@"
              else
                  echo "[redis-entrypoint] replica path (POD_NAME=${POD_NAME}); discovering master via Sentinel..."
                  # Discover the current master from Sentinel rather than
                  # hard-coding `replicaof redis-0.redis-headless`. The
                  # hard-coded form caused chained replication: after any
                  # Sentinel-driven failover demoted redis-0, fresh
                  # replica pods would replicate from a slave instead of
                  # the new master, producing a multi-hop chain (and worse
                  # availability — losing one link drops a whole branch).
                  #
                  # `SENTINEL get-master-addr-by-name chatroom-redis`
                  # returns `[ip, port]`. The IP is the master pod's IP,
                  # which is fine for boot — Sentinel itself sends
                  # `REPLICAOF new-master-ip port` to all slaves during a
                  # failover, so the replica will follow its master from
                  # then on without our help. We only need a correct
                  # initial pointer.
                  #
                  # We bound the wait at 60s (30 × 2s). By then kubelet
                  # will have restarted us via the liveness probe anyway,
                  # and a clean restart against a now-known Sentinel is
                  # better than waiting indefinitely.
                  MASTER_IP=""
                  for attempt in $(seq 1 30); do
                      MASTER_IP=$(redis-cli -h chatroom-redis-sentinel -p 26379 -t 1 sentinel get-master-addr-by-name chatroom-redis 2>/dev/null | head -n 1 | tr -d '\r')
                      if [ -n "$MASTER_IP" ] && [ "$MASTER_IP" != "(nil)" ]; then
                          # Sanity-check the candidate is actually a live
                          # Redis master (a TCP probe alone could hit an
                          # arbiter; an INFO reply confirms role=master).
                          # The Redis text protocol uses CRLF line endings,
                          # so we strip '\r' before grepping — without the
                          # strip, `^role:master$` won't match the line
                          # `role:master\r` and the candidate is rejected
                          # forever even when it really is the master.
                          if redis-cli -h "$MASTER_IP" -p 6379 -t 1 info replication 2>/dev/null | tr -d '\r' | grep -q '^role:master$'; then
                              echo "[redis-entrypoint] Sentinel reports master=${MASTER_IP} on attempt $attempt"
                              break
                          fi
                      fi
                      MASTER_IP=""
                      sleep 2
                  done
                  if [ -z "$MASTER_IP" ]; then
                      echo "[redis-entrypoint] FATAL: Sentinel did not report a live master within 60s" >&2
                      exit 1
                  fi
                  # The redis:7-alpine entrypoint translates every CLI
                  # arg into a line in its rendered config file. Passing
                  # `--replicaof host port` therefore turns into the
                  # directive `replicaof "host" "port"` — and if any
                  # further CLI arg follows on the same argv, the next
                  # arg gets concatenated onto the same `replicaof` line
                  # and Redis rejects it with "wrong number of arguments".
                  # The first attempt (`exec redis-server --replicaof ...
                  # 6379 "$@"`) hit exactly this bug; a second attempt
                  # that rendered `replicaof ...` into a separate config
                  # file and exec'd `redis-server "$REPLICA_CONF" -- "$@"`
                  # also broke, because the entrypoint still appends the
                  # trailing CLI args to the merged config and the first
                  # trailing arg (`""` from `--save ""`) lands on the
                  # same `replicaof` line.
                  #
                  # Cleanest fix: render the *full* config (replicaof +
                  # everything the StatefulSet's `args:` used to pass)
                  # into our own file and pass that to redis-server.
                  # That way the entrypoint has no CLI args left to
                  # splice in, and we own the file format end-to-end.
                  REPLICA_CONF=/tmp/redis-replica.conf
                  printf 'replicaof %s 6379\nsave ""\nappendonly yes\nappendfsync everysec\nmaxmemory 128mb\nmaxmemory-policy allkeys-lru\n' "$MASTER_IP" > "$REPLICA_CONF"
                  exec redis-server "$REPLICA_CONF"
              fi
          args:
            - --save
            - ""
            - --appendonly
            - "yes"
            # AOF every second — survives a pod restart with at most 1s
            # of unacknowledged writes (matches the chatroom's MySQL
            # durability, since messages are already persisted there).
            - --appendfsync
            - everysec
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            # PING returns PONG on a healthy server. Hits the local
            # server (no -h) so a single Redis pod's health is
            # independent of every other pod.
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: chatroom
          app.kubernetes.io/component: redis
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        # No storageClassName: uses the cluster's default StorageClass.
        # Works on kind, k3d, minikube, GKE, EKS, AKS, etc. out of the box.