apiVersion: v1
kind: ConfigMap
metadata:
  name: chatroom-app
  namespace: chatroom
  labels:
    app.kubernetes.io/name: chatroom
    app.kubernetes.io/component: app
data:
  # Inside the cluster, the MySQL service is reachable at the DNS name
  # `mysql` (the Service in 22-mysql-service.yaml).
  MYSQL_HOST: "mysql"
  MYSQL_PORT: "3306"
  MYSQL_USER: "root"
  MYSQL_DB: "chatroom_db"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  # The five MAIL_* keys (MAIL_HOST, MAIL_PORT, MAIL_USER, MAIL_FROM,
  # MAIL_USE_TLS) are NOT set here. scripts/deploy_k8s.sh writes them
  # imperatively into the chatroom-app ConfigMap at deploy time, sourced
  # from app/.env.runtime. This manifest is just the static values; the
  # imperative write is the source of truth at runtime. The MAIL_PASSWORD
  # key lives in the chatroom-app Secret (also written imperatively).
  #
  # The values that must stay secret (MYSQL_PASSWORD, SECRET_KEY,
  # ROOM_SECRET_KEY) live in the chatroom-app Secret, not here.
