---
# ConfigMap built from the repo's database_setup.sql by scripts/bootstrap.sh.
# The init Job consumes it via a volume mount.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  namespace: chatroom
data:
  database_setup.sql: |
    -- placeholder; replaced by bootstrap.sh from /home/pratic/Desktop/chat-room-server/database_setup.sql
    SELECT 'no schema loaded yet' AS status;
---
# One-shot Job. Bootstrap order:
#   1. scripts/bootstrap.sh applies 30-mysql-statefulset.yaml and waits for mysql-0 Ready.
#   2. scripts/bootstrap.sh then applies 35-mysql-init-job.yaml and waits for the Job to succeed.
#   3. Then the app Deployment can start.
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-init
  namespace: chatroom
  labels:
    app: mysql-init
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: mysql-init
    spec:
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 999
      containers:
        - name: init
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -eu
            - -o
            - pipefail
            - -c
            - |
              # Wait for the mysqld to be fully ready (readiness probe is a
              # ping, but root password auth can take a moment longer on
              # first boot while init scripts run).
              for i in $(seq 1 60); do
                if mysql -h mysql -u root -p"$MYSQL_ROOT_PASSWORD" \
                       -e "SELECT 1" >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              mysql -h mysql -u root -p"$MYSQL_ROOT_PASSWORD" \
                    -e "SELECT VERSION()" || {
                echo "MySQL never became ready"; exit 1;
              }

              # Apply schema (idempotent — uses CREATE TABLE IF NOT EXISTS / ALTER … IF EXISTS).
              echo "Applying schema..."
              mysql -h mysql -u root -p"$MYSQL_ROOT_PASSWORD" chatroom_db < /sql/database_setup.sql

              # Create the limited-privilege app user used by the FastAPI
              # service. The password here is the same value that lives in
              # the chatroom-secrets Secret (bootstrap.sh keeps both in sync).
              echo "Creating app user..."
              mysql -h mysql -u root -p"$MYSQL_ROOT_PASSWORD" <<EOSQL
              CREATE USER IF NOT EXISTS 'chatroom'@'%' IDENTIFIED BY '${MYSQL_APP_PASSWORD}';
              GRANT ALL PRIVILEGES ON chatroom_db.* TO 'chatroom'@'%';
              FLUSH PRIVILEGES;
              EOSQL

              # Verify
              mysql -h mysql -u chatroom -p"${MYSQL_APP_PASSWORD}" chatroom_db \
                    -e "SHOW TABLES;" || {
                echo "App user cannot read chatroom_db"; exit 1;
              }
              echo "Init complete."
          envFrom:
            - secretRef:
                name: mysql-secret
          env:
            - name: MYSQL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatroom-secrets
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
      volumes:
        - name: sql
          configMap:
            name: mysql-init-sql
