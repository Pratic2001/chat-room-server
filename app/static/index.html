<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="app-body">
    <div id="app" class="app">
        <header class="app-header">
            <div class="app-brand">
                <span class="app-mark" aria-hidden="true"></span>
                <span>Chat</span>
            </div>
            <div class="app-user">
                <span id="username-display" class="app-username"></span>
                <button id="logout-btn" class="btn btn-ghost" type="button">Log out</button>
            </div>
        </header>

        <main class="app-main">
            <aside class="sidebar" aria-label="Rooms">
                <div class="sidebar-head">
                    <h2>Rooms</h2>
                    <button id="create-room-btn" class="btn btn-primary btn-sm" type="button">New room</button>
                </div>
                <ul id="room-list" class="room-list" role="list">
                    <li class="room-empty" id="room-empty">No rooms yet. Create one to start chatting.</li>
                </ul>
            </aside>

            <section class="chat" aria-label="Chat">
                <header class="chat-header" id="chat-header">
                    <div>
                        <h2 id="current-room-name">No room selected</h2>
                        <p class="chat-sub" id="current-room-sub">Choose a room from the sidebar, or create a new one.</p>
                    </div>
                    <div class="chat-actions">
                        <button id="invite-btn" class="btn btn-ghost btn-sm" type="button" disabled>Invite</button>
                        <button id="leave-room-btn" class="btn btn-ghost btn-sm" type="button" disabled>Leave</button>
                    </div>
                </header>

                <div id="messages-container" class="messages" role="log" aria-live="polite">
                    <div class="messages-empty">No messages here yet.</div>
                </div>

                <form id="message-form" class="composer" autocomplete="off">
                    <button type="button" id="attach-btn" class="btn btn-ghost btn-icon" aria-label="Attach a file">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <input type="file" id="file-input" class="visually-hidden" accept="image/*,video/*,.pdf,.txt,.zip">
                    <input type="text" id="message-input" class="composer-input" placeholder="Type a message" maxlength="4000" disabled>
                    <button type="submit" id="send-btn" class="btn btn-primary" disabled>Send</button>
                </form>
            </section>
        </main>
    </div>

    <!-- Create room modal -->
    <div id="modal-backdrop" class="modal-backdrop" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <h3 id="modal-title">Create a room</h3>
            <p class="modal-sub">Anyone with the name and secret phrase can join.</p>
            <form id="create-room-form">
                <label>
                    <span>Room name</span>
                    <input type="text" id="new-room-name" required maxlength="80">
                </label>
                <label>
                    <span>Secret phrase</span>
                    <input type="text" id="new-room-secret" required maxlength="80">
                </label>
                <p id="create-room-error" class="form-error" role="alert"></p>
                <div class="modal-actions">
                    <button type="button" id="modal-cancel" class="btn btn-ghost">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Join room modal -->
    <div id="join-backdrop" class="modal-backdrop" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="join-title">
            <h3 id="join-title">Join a room</h3>
            <p class="modal-sub" id="join-sub">Enter the secret phrase to join.</p>
            <form id="join-room-form">
                <label>
                    <span>Secret phrase</span>
                    <input type="text" id="join-secret" required maxlength="80" autocomplete="off">
                </label>
                <p id="join-room-error" class="form-error" role="alert"></p>
                <div class="modal-actions">
                    <button type="button" id="join-cancel" class="btn btn-ghost">Cancel</button>
                    <button type="submit" class="btn btn-primary">Join</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script src="/static/script.js"></script>
</body>
</html>
